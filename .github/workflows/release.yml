name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build library
        run: npm run build

      - name: Zip library output
        run: cd dist && zip ../panelset.zip *.js *.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: panelset.zip